name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: macOS (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: .tool-versions
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform darwin/arm64

      # ditto is what macOS itself uses: it keeps the executable bit and the
      # bundle layout, and Finder expands the result on double-click. A plain
      # upload-artifact zip would drop the executable bit ("all files will have
      # 644") and leave Contents/MacOS/pasha-go unrunnable.
      - name: Archive app bundle
        working-directory: build/bin
        run: ditto -c -k --sequesterRsrc --keepParent pasha-go.app ../../pasha-go-darwin-arm64.zip

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pasha-go-darwin-arm64
          path: pasha-go-darwin-arm64.zip
          archive: false
          retention-days: 14

      # Artifacts need a signed-in GitHub account to download; a release asset
      # does not. A release must have a tag, so `latest` is reused and moved on
      # every merge: one entry, always the current main.
      - name: Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest \
            --title latest \
            --notes "Built from ${{ github.sha }}" \
            pasha-go-darwin-arm64.zip
